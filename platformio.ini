[platformio]
src_dir = src

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
lib_deps  =
    adafruit/Adafruit PWM Servo Driver Library
    adafruit/Adafruit BusIO
build_src_filter = +<esp32/*> +<core/*>

[env:native]
platform = native
build_flags = -std=c++14
build_src_filter = +<core/*> +<test/*>
